<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大胖的仪表盘</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tools.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 主题1: 深邃科技 (默认) */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent-cyan: #00d4ff;
            --accent-gold: #ffd700;
            --accent-purple: #a855f7;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(0, 212, 255, 0.15);
        }

        /* 主题2: 暗夜紫韵 */
        [data-theme="purple"] {
            --bg-primary: #1a0a2e;
            --bg-secondary: #2d1b4e;
            --bg-card: rgba(255, 255, 255, 0.04);
            --border: rgba(180, 120, 255, 0.12);
            --text-primary: #f3e5f5;
            --text-secondary: rgba(225, 190, 255, 0.7);
            --text-muted: rgba(200, 160, 255, 0.5);
            --accent-cyan: #e040fb;
            --accent-gold: #ffd54f;
            --accent-purple: #b39ddb;
            --accent-green: #69f0ae;
            --accent-red: #ff8a80;
            --shadow: 0 8px 32px rgba(100, 50, 200, 0.35);
            --shadow-glow: 0 0 40px rgba(224, 64, 251, 0.2);
        }

        /* 主题3: 森林墨绿 */
        [data-theme="forest"] {
            --bg-primary: #0d1f0d;
            --bg-secondary: #1a331a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --border: rgba(100, 200, 100, 0.15);
            --text-primary: #e8f5e9;
            --text-secondary: rgba(180, 230, 180, 0.7);
            --text-muted: rgba(150, 210, 150, 0.5);
            --accent-cyan: #69f0ae;
            --accent-gold: #fff59d;
            --accent-purple: #ce93d8;
            --accent-green: #a5d6a7;
            --accent-red: #ff8a80;
            --shadow: 0 8px 32px rgba(50, 150, 50, 0.3);
            --shadow-glow: 0 0 40px rgba(105, 240, 174, 0.2);
        }

        /* 主题6: 樱花粉白（浅色） */
        [data-theme="sakura"] {
            --bg-primary: #fdf2f4;
            --bg-secondary: #fce7eb;
            --bg-card: rgba(255, 255, 255, 0.9);
            --border: rgba(200, 100, 130, 0.25);
            --text-primary: #2d1a20;
            --text-secondary: rgba(45, 26, 32, 0.85);
            --text-muted: rgba(45, 26, 32, 0.6);
            --accent-cyan: #e91e63;
            --accent-gold: #ff7043;
            --accent-purple: #9c27b0;
            --accent-green: #4caf50;
            --accent-red: #f44336;
            --shadow: 0 8px 32px rgba(200, 100, 130, 0.25);
            --shadow-glow: 0 0 40px rgba(233, 30, 99, 0.2);
        }

        /* 主题7: 天空蓝白（浅色） */
        [data-theme="sky"] {
            --bg-primary: #f0f8ff;
            --bg-secondary: #e6f3ff;
            --bg-card: rgba(255, 255, 255, 0.9);
            --border: rgba(100, 150, 200, 0.3);
            --text-primary: #0d2137;
            --text-secondary: rgba(13, 33, 55, 0.85);
            --text-muted: rgba(13, 33, 55, 0.6);
            --accent-cyan: #1976d2;
            --accent-gold: #f57c00;
            --accent-purple: #7b1fa2;
            --accent-green: #388e3c;
            --accent-red: #d32f2f;
            --shadow: 0 8px 32px rgba(100, 150, 200, 0.25);
            --shadow-glow: 0 0 40px rgba(25, 118, 210, 0.2);
        }

        /* 主题8: 薄荷奶绿（浅色） */
        [data-theme="mint"] {
            --bg-primary: #f0fdf4;
            --bg-secondary: #dcfce7;
            --bg-card: rgba(255, 255, 255, 0.9);
            --border: rgba(100, 180, 130, 0.3);
            --text-primary: #0d3320;
            --text-secondary: rgba(13, 51, 32, 0.85);
            --text-muted: rgba(13, 51, 32, 0.6);
            --accent-cyan: #2e7d32;
            --accent-gold: #f57f17;
            --accent-purple: #6a1b9a;
            --accent-green: #1b5e20;
            --accent-red: #c62828;
            --shadow: 0 8px 32px rgba(100, 180, 130, 0.25);
            --shadow-glow: 0 0 40px rgba(46, 125, 50, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 背景动画 */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 215, 0, 0.03) 0%, transparent 60%);
            animation: bgPulse 10s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* 顶部栏 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 18px;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        /* 主题切换面板 */
        .theme-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            z-index: 1001;
            box-shadow: var(--shadow);
            display: none;
            min-width: 200px;
        }

        .theme-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .theme-panel-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .theme-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .theme-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .theme-option:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .theme-option.active {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
        }

        .theme-preview {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 2px solid var(--border);
        }

        .theme-preview.tech { background: linear-gradient(135deg, #0a0a0f, #12121a); }
        .theme-preview.purple { background: linear-gradient(135deg, #1a0a2e, #2d1b4e); }
        .theme-preview.forest { background: linear-gradient(135deg, #0d1f0d, #1a331a); }
        .theme-preview.sakura { background: linear-gradient(135deg, #fdf2f4, #fce7eb); border-color: rgba(200, 100, 130, 0.5); }
        .theme-preview.sky { background: linear-gradient(135deg, #f0f8ff, #e6f3ff); border-color: rgba(100, 150, 200, 0.5); }
        .theme-preview.mint { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-color: rgba(100, 180, 130, 0.5); }

        .theme-name {
            font-size: 14px;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .theme-option.active .theme-name {
            color: #ffffff;
            font-weight: 500;
        }

        /* 主布局 */
        .main-layout {
            display: flex;
            min-height: 100vh;
            padding-top: 70px;
        }

        /* 左侧导航 */
        .sidebar {
            width: 280px;
            background: rgba(18, 18, 26, 0.6);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            position: fixed;
            height: calc(100vh - 70px);
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar-section {
            margin-bottom: 40px;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
            padding-left: 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(168, 85, 247, 0.15));
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--accent-cyan);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .nav-badge {
            margin-left: auto;
            background: var(--accent-cyan);
            color: var(--bg-primary);
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* 主内容区 */
        .content {
            flex: 1;
            margin-left: 280px;
            padding: 40px;
            min-height: calc(100vh - 70px);
        }

        /* 顶部卡片栏 */
        .top-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow-glow);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .card-content {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .card-value {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .card-unit {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .card-desc {
            margin-top: 12px;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* 天气卡片特殊样式 */
        .weather-card .card-icon {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.2);
            animation: weatherPulse 3s ease-in-out infinite;
        }

        @keyframes weatherPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }
        }

        .weather-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 8px;
        }

        .weather-temp {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .weather-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .weather-city {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .weather-status {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 主内容区域 */
        .main-area {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            min-height: 500px;
        }

        .area-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .area-title {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .area-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: white;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        /* 待办列表 */
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            transition: all 0.3s;
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .todo-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .todo-checkbox:hover {
            border-color: var(--accent-cyan);
        }

        .todo-checkbox.checked {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
        }

        .todo-text {
            flex: 1;
            font-size: 15px;
            color: var(--text-primary);
        }

        .todo-text.completed {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .todo-priority {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .priority-high {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
        }

        .priority-medium {
            background: rgba(255, 215, 0, 0.15);
            color: var(--accent-gold);
        }

        .priority-low {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
        }

        .todo-delete {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            opacity: 0;
        }

        .todo-item:hover .todo-delete {
            opacity: 1;
        }

        .todo-delete:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
        }

        /* 子任务样式 */
        .todo-main {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .todo-item.done {
            opacity: 0.7;
        }

        .subtask-badge {
            font-size: 12px;
            padding: 2px 8px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
            color: var(--accent-cyan);
        }

        .todo-toggle {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 12px;
        }

        .todo-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .subtask-list {
            margin-top: 12px;
            margin-left: 48px;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.1);
            border-left: 3px solid var(--accent-cyan);
            border-radius: 0 12px 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .subtask-list-header {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .subtask-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .subtask-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .subtask-item.done {
            opacity: 0.6;
        }

        .subtask-item.done .subtask-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .subtask-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .subtask-checkbox:hover {
            border-color: var(--accent-cyan);
        }

        .subtask-checkbox.checked {
            background: var(--accent-cyan);
            border-color: var(--accent-cyan);
            color: var(--bg-primary);
        }

        .subtask-text {
            flex: 1;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .subtask-delete {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            opacity: 0;
            font-size: 16px;
        }

        .subtask-item:hover .subtask-delete {
            opacity: 1;
        }

        .subtask-delete:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
        }

        .subtask-input-area {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed var(--border);
        }

        .subtask-input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .subtask-input:focus {
            border-color: var(--accent-cyan);
        }

        .btn-subtask-add {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--accent-cyan);
            border: none;
            color: var(--bg-primary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .btn-subtask-add:hover {
            transform: scale(1.05);
        }

        /* 添加待办输入 */
        .todo-input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .todo-input {
            flex: 1;
            min-width: 200px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .todo-input:focus {
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.08);
        }

        .todo-input::placeholder {
            color: var(--text-muted);
        }

        /* 温馨提示 */
        .weather-tip {
            margin-top: 16px;
            padding: 12px 16px;
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.15) 0%, rgba(255, 152, 0, 0.1) 100%);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #ffc107;
            transition: all 0.3s ease;
        }

        .weather-tip.cold {
            background: linear-gradient(135deg, rgba(33, 150, 243, 0.15) 0%, rgba(3, 169, 244, 0.1) 100%);
            border-color: rgba(33, 150, 243, 0.3);
            color: #4fc3f7;
        }

        .weather-tip.hot {
            background: linear-gradient(135deg, rgba(244, 67, 54, 0.15) 0%, rgba(255, 87, 34, 0.1) 100%);
            border-color: rgba(244, 67, 54, 0.3);
            color: #ff8a80;
        }

        .weather-tip.rain {
            background: linear-gradient(135deg, rgba(156, 39, 176, 0.15) 0%, rgba(103, 58, 183, 0.1) 100%);
            border-color: rgba(156, 39, 176, 0.3);
            color: #ce93d8;
        }

        .weather-tip.normal {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.15) 0%, rgba(139, 195, 74, 0.1) 100%);
            border-color: rgba(76, 175, 80, 0.3);
            color: #a5d6a7;
        }

        .weather-tip-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .weather-tip-text {
            line-height: 1.5;
        }

        /* 城市选择器 */
        .city-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
        }

        .city-select:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-cyan);
        }

        .city-select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 8px;
        }

        /* 优先级选择器 */
        .priority-selector {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 6px;
        }

        .priority-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .priority-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .priority-btn.active {
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent-cyan);
        }

        .priority-btn.active[data-priority="high"] {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
        }

        .priority-btn.active[data-priority="medium"] {
            background: rgba(255, 215, 0, 0.15);
            color: var(--accent-gold);
        }

        .priority-btn.active[data-priority="low"] {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
        }

        .priority-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .priority-dot.high {
            background: var(--accent-red);
        }

        .priority-dot.medium {
            background: var(--accent-gold);
        }

        .priority-dot.low {
            background: var(--accent-green);
        }

        /* 工具网格 */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.05);
        }

        .tool-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 16px;
        }

        .tool-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .tool-desc {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .empty-hint {
            font-size: 14px;
            opacity: 0.7;
        }

        /* 移动端菜单按钮 */
        .mobile-menu-btn {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
                z-index: 999;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .content {
                margin-left: 0;
            }

            .mobile-menu-btn {
                display: flex;
            }

            .top-cards {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 20px;
            }

            .content {
                padding: 20px;
            }

            .main-area {
                padding: 20px;
            }

            .area-header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .tools-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <!-- 顶部栏 -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <span>我的仪表盘</span>
        </div>
        <div class="header-actions">
            <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
            <button class="header-btn" onclick="refreshWeather()">🔄</button>
            <button class="header-btn" onclick="toggleThemePanel()">🎨</button>
            <button class="header-btn">👤</button>
        </div>
    </header>

    <!-- 主题切换面板 -->
    <div class="theme-panel" id="themePanel">
        <div class="theme-panel-title">选择主题</div>
        <div class="theme-options">
            <div class="theme-option active" data-theme="" onclick="setTheme('')">
                <div class="theme-preview tech"></div>
                <span class="theme-name">深邃科技</span>
            </div>
            <div class="theme-option" data-theme="purple" onclick="setTheme('purple')">
                <div class="theme-preview purple"></div>
                <span class="theme-name">暗夜紫韵</span>
            </div>
            <div class="theme-option" data-theme="forest" onclick="setTheme('forest')">
                <div class="theme-preview forest"></div>
                <span class="theme-name">森林墨绿</span>
            </div>
            <div class="theme-option" data-theme="sakura" onclick="setTheme('sakura')">
                <div class="theme-preview sakura"></div>
                <span class="theme-name">樱花粉白</span>
            </div>
            <div class="theme-option" data-theme="sky" onclick="setTheme('sky')">
                <div class="theme-preview sky"></div>
                <span class="theme-name">天空蓝白</span>
            </div>
            <div class="theme-option" data-theme="mint" onclick="setTheme('mint')">
                <div class="theme-preview mint"></div>
                <span class="theme-name">薄荷奶绿</span>
            </div>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左侧导航 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">导航</div>
                <div class="nav-item active" onclick="switchTab('todo')">
                    <span class="nav-icon">📋</span>
                    <span>待办事项</span>
                    <span class="nav-badge" id="todoCount">0</span>
                </div>
                <div class="nav-item" onclick="switchTab('tools')">
                    <span class="nav-icon">🛠️</span>
                    <span>工具箱</span>
                </div>
            </div>

            <div class="sidebar-section">

            <div class="sidebar-section">
                <div class="sidebar-title">小游戏</div>
                <div class="nav-item" onclick="window.open('https://zhangdapang-openai.github.io/snake-game/', '_blank')">
                    <span class="nav-icon">🐍</span>
                    <span>贪吃蛇</span>
                </div>
                <div class="nav-item" onclick="window.open('https://zhangdapang-openai.github.io/gomoku-game/', '_blank')">
                    <span class="nav-icon">⚫</span>
                    <span>张谷五子棋</span>
                </div>
            </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="content">
            <!-- 顶部卡片栏 -->
            <div class="top-cards">
                <!-- 天气+日期合并卡片 -->
                <div class="card weather-card" style="flex: 2;">
                    <div class="card-header">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span class="card-title" id="weatherCityTitle">杭州</span>
                            <span style="color: var(--text-muted);">·</span>
                            <span class="card-title">今日</span>
                            <select class="city-select" id="citySelect" onchange="changeCity(this.value)" title="切换城市">
                                <option value="101210101">杭州</option>
                                <option value="101040400">宁波</option>
                                <option value="101030100">天津</option>
                                <option value="101180101">郑州</option>
                                <option value="101020100">上海</option>
                                <option value="101010100">北京</option>
                                <option value="auto">📍 自动定位</option>
                            </select>
                        </div>
                        <div class="card-icon" id="weatherIcon">☀️</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
                        <div class="weather-info" style="flex: 1;">
                            <span class="weather-temp" id="weatherTemp">--°</span>
                            <div class="weather-details">
                                <span class="weather-status" id="weatherStatus">加载中...</span>
                                <span class="card-desc" id="weatherDetail" style="margin-top: 4px;">--</span>
                            </div>
                        </div>
                        <div style="text-align: center; padding-left: 24px; border-left: 1px solid var(--border);">
                            <div style="font-size: 32px; font-weight: 700;" id="currentDate">--</div>
                            <div style="font-size: 14px; color: var(--text-muted); margin-top: 4px;" id="currentWeekday">--</div>
                        </div>
                    </div>
                    <!-- 温馨提示 -->
                    <div class="weather-tip" id="weatherTip">
                        <span class="weather-tip-icon">💡</span>
                        <span class="weather-tip-text">正在获取天气信息...</span>
                    </div>
                </div>

                <!-- 待办统计卡片 -->
                <div class="card" style="flex: 1; min-width: 200px; position: relative;">
                    <div class="card-header" style="margin-bottom: 16px;">
                        <span class="card-title">待办事项统计</span>
                        <div class="card-icon" style="background: rgba(168, 85, 247, 0.1); border-color: rgba(168, 85, 247, 0.2); width: 36px; height: 36px; font-size: 18px;">📋</div>
                    </div>
                    <div style="display: flex; gap: 20px; margin-bottom: 8px;">
                        <div style="text-align: center;">
                            <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 4px;">已完成</div>
                            <div style="font-size: 36px; font-weight: 700; color: var(--accent-green);">✓ <span id="todoCompleted">0</span></div>
                        </div>
                        <div style="text-align: center;">
                            <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 4px;">未完成</div>
                            <div style="font-size: 36px; font-weight: 700; color: var(--accent-cyan);">○ <span id="todoRemaining">0</span></div>
                        </div>
                    </div>
                    <div style="position: absolute; bottom: 16px; right: 16px; font-size: 12px; color: var(--text-muted);">
                        总计: <span id="todoTotal" style="font-weight: 600; color: var(--text-primary);">0</span>
                    </div>
                </div>
            </div>

            <!-- 主内容区域 -->
            <div class="main-area" id="mainArea">
                <!-- 待办视图 -->
                <div id="todoView">
                    <div class="area-header">
                        <h2 class="area-title">
                            <span>📋</span>
                            <span>待办事项</span>
                        </h2>
                        <div class="area-actions">
                            <button class="btn btn-secondary" onclick="clearCompleted()">清除已完成</button>
                            <button class="btn btn-primary" onclick="focusInput()">+ 新建待办</button>
                        </div>
                    </div>

                    <div class="todo-input-area">
                        <input type="text" class="todo-input" id="todoInput" placeholder="添加新的待办事项..." onkeypress="handleEnter(event)">
                        <div class="priority-selector" id="prioritySelector">
                            <button class="priority-btn" data-priority="high" onclick="selectPriority('high')">
                                <span class="priority-dot high"></span>高
                            </button>
                            <button class="priority-btn active" data-priority="medium" onclick="selectPriority('medium')">
                                <span class="priority-dot medium"></span>中
                            </button>
                            <button class="priority-btn" data-priority="low" onclick="selectPriority('low')">
                                <span class="priority-dot low"></span>低
                            </button>
                        </div>
                        <input type="hidden" id="priorityValue" value="medium">
                        <button class="btn btn-primary" onclick="addTodo()">添加</button>
                    </div>

                    <div class="todo-list" id="todoList">
                        <!-- 待办列表将在这里渲染 -->
                    </div>
                </div>

                <!-- 工具视图 -->
                <div id="toolsView" style="display: none;">
                    <div class="area-header">
                        <h2 class="area-title">
                            <span>🛠️</span>
                            <span>工具箱</span>
                        </h2>
                    </div>

                    <div class="tools-grid">
                        <div class="tool-card" onclick="openTool('pomodoro')">
                            <div class="tool-icon">⏱️</div>
                            <div class="tool-name">番茄钟</div>
                            <div class="tool-desc">25分钟专注计时</div>
                        </div>

                        <div class="tool-card" onclick="openTool('calculator')">
                            <div class="tool-icon">🧮</div>
                            <div class="tool-name">计算器</div>
                            <div class="tool-desc">快速计算工具</div>
                        </div>

                        <div class="tool-card" onclick="openTool('countdown')">
                            <div class="tool-icon">⏳</div>
                            <div class="tool-name">倒计时</div>
                            <div class="tool-desc">自定义倒计时</div>
                        </div>

                        <div class="tool-card" onclick="openTool('note')">
                            <div class="tool-icon">📝</div>
                            <div class="tool-name">快速笔记</div>
                            <div class="tool-desc">临时记录想法</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 工具模态框 -->
    <div class="modal" id="toolModal">
        <div class="modal-overlay" onclick="closeTool()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">工具</h3>
                <button class="modal-close" onclick="closeTool()">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 工具内容将在这里动态加载 -->
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
